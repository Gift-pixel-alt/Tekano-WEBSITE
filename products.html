<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu | Tekano Eats</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="Tekano Eats - Order delicious affordable meals online quickly and easily.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Tekano Eats">
  <meta name="description" content="Order food online with Tekano Eats - fast delivery and affordable meals.">
  <meta name="keywords" content="food delivery, online ordering, burgers, kota, meals">
</head>
<body>

<header>
  <nav class="navbar">
    <h1 class="logo">Tekano Eats</h1>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="products.html">Menu</a></li>
      <li><a href="enquiry.html">Enquiry</a></li>
      <li><a href="contact.html">Contact</a></li>

      <!-- CART ICON -->
<div id="cartNav" onclick="goToCart()">
    🛒 Cart <span id="cartCount">0</span>
  </div>

    </ul>
  </nav>
</header>


  
 

<main>
  <section class="content">
    <h2>Our Menu 🍽️</h2>

    <input type="text" id="searchMenu" placeholder="Search food...">

    <div class="menu-grid">

        <div class="menu-item">
            <img src="images/burger.jpg" alt="Chicken Burger" onclick="openLightbox(this)">
            <h3>Chicken Burger</h3>
            <strong>R55</strong><br>
            <button onclick="addToCart('Chicken Burger', 55)">Add to Cart</button>
          </div>
      
          <div class="menu-item">
            <img src="images/kota.jpg" alt="Beef Kota" onclick="openLightbox(this)">
            <h3>Beef Kota</h3>
            <strong>R45</strong><br>
            <button onclick="addToCart('Beef Kota', 45)">Add to Cart</button>
          </div>
      
          <div class="menu-item">
            <img src="images/wrap.jpg" alt="Vegetarian Wrap" onclick="openLightbox(this)">
            <h3>Vegetarian Wrap</h3>
            <strong>R40</strong><br>
            <button onclick="addToCart('Vegetarian Wrap', 40)">Add to Cart</button>
          </div>
      
    </div>
  </section>

  
</main>

<footer>
  <p>&copy; 2026 Tekano Eats</p>
</footer>
<script src="js/script.js"></script>
</body>
</html>
